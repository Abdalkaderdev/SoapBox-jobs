# =============================================================================
# SoapBox Jobs - Kubernetes Service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: soapbox-jobs
  namespace: soapbox
  labels:
    app: soapbox-jobs
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: soapbox-jobs
