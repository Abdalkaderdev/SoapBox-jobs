# =============================================================================
# SoapBox Jobs - Build and Deploy to DigitalOcean
# =============================================================================
# Builds Docker image and deploys to DigitalOcean Kubernetes
# =============================================================================

name: Build and Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.ts'
      - 'tsconfig.json'
      - 'Dockerfile'
      - '.github/workflows/build-and-deploy.yml'

  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests'
        type: boolean
        default: false
      skip_deploy:
        description: 'Skip deployment (build only)'
        type: boolean
        default: false

env:
  REGISTRY: registry.digitalocean.com
  REGISTRY_NAME: soapbox-registry
  IMAGE_NAME: soapbox-jobs
  CLUSTER_NAME: soapbox-production
  NAMESPACE: soapbox

concurrency:
  group: deploy-jobs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Build Docker Image
  # ===========================================================================
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.short_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set variables
        id: vars
        run: |
          echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Login to Registry
        run: doctl registry login --expiry-seconds 600

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.short_sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
          build-args: |
            NODE_ENV=production

      - name: Summary
        run: |
          echo "## Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ env.REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.short_sha }}\`" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Tests (runs in parallel with build)
  # ===========================================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_tests != 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --prefer-offline

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build

  # ===========================================================================
  # Deploy to Kubernetes
  # ===========================================================================
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ github.event.inputs.skip_deploy != 'true' && needs.build.result == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save ${{ env.CLUSTER_NAME }} --expiry-seconds 600

      - name: Apply Kubernetes Manifests
        run: |
          kubectl apply -f k8s/

      - name: Deploy
        run: |
          kubectl set image deployment/soapbox-jobs \
            soapbox-jobs=${{ env.REGISTRY }}/${{ env.REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }} \
            -n ${{ env.NAMESPACE }}

      - name: Wait for rollout
        run: |
          echo "Waiting for soapbox-jobs rollout..."
          kubectl rollout status deployment/soapbox-jobs -n ${{ env.NAMESPACE }} --timeout=300s

      - name: Verify
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Jobs Platform Pods" >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n ${{ env.NAMESPACE }} -l app=soapbox-jobs >> $GITHUB_STEP_SUMMARY
